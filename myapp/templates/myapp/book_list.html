{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2> የተጠቆሙ መጻሃፍ ዝርዝር </h2>
        <a href="{% url 'add_book' %}" class="btn btn-primary"> አድስ መጽሃፍ ይጠቁሙ</a>
    </div>

    <div class="row">
        {% for book in books %}
            <div class="col-md-4 mb-3">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-seccess">
                            <a href="{% url 'book_detail' book.pk %}" class="text-decoration-none text-success"> {{book.title}}</a>
                            </h5>
                        <h6 class="card-subtitle mb-2 text-muted">ደራሲ፡ {{book.author}}</h6>
                        <p class="card-text"><small class="text-secondary">ጠቋሚ፡ {{book.recommended_by}}</small></p>

                        <a href="{% url 'book_detail' book.pk %}" class="btn btn-sm btn-outline-primary mt-2">ዝርዝር ይመልከቱ </a>
                    </div>
                </div>
            </div>
        {% empty %}
        <div class="col-12">
            <div class="alert alert-info">እስካሁን ምንም የተጠቆመ መጽሃፍ  የለም ፡፡ የመጀመርያ ጠቋሚ ይሁኑ! </div>
        </div>
    {% endfor %}
    </div>
</div>
{% endblock content %}
