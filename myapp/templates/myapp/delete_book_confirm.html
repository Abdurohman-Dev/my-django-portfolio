{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 rext-center">
            <div class="card shadow border-danger">
                <div class="card-body">
                    <h3 class="text-danger mb-4">እርግጠኛ ነዎት?</h3>
                    <p class="fs-5"><strong>"{{book.title}}"</strong>የሚለዉን መጽሃፍ ሙሉ ብሙሉ ማጥፋት ይፈልጋሉ?</p>
                    <form method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2">አዎ አጥፋ </button>
                        <a href="{% url 'book_detail' book.pk %}" class="btn btn-secondary ">አይ ተመለስ </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
