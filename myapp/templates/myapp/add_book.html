{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shodow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">አድስ ምጽሃፍ ይጠቁሙ </h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-sucess w-100 mt-3">መጽሃፉን መዝግብ </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
